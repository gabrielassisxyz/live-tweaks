name: ci
on:
  push:
    branches: [master]
  pull_request:
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # bin/ci runs the prose gate, which resolves a merge base to find the
          # lines this branch adds. A shallow clone has no base commit to reach.
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with: { node-version: "24", cache: "npm" }
      - env:
          # Empty on a push, where the fallback (origin/master) is the right base anyway.
          SLOP_GUARD_BASE: ${{ github.event.pull_request.base.sha }}
        run: bin/ci
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with: { fetch-depth: 0 }
      # gitleaks CLI, not gitleaks-action — same binary/rules as the pre-commit hook,
      # no write token needed. Catches hooks bypassed with --no-verify.
      - name: Secret scan (full history)
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz | tar -xz -C /tmp gitleaks
          /tmp/gitleaks git --no-banner --redact
